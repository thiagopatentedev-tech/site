:root{--papel:#f3efe6;--tinta:#15202b;--coral:#d97757;--terra:#7c2410;--verde:#2bb673;--azul:#3aa7ff;--amarelo:#ffc23f;--rosa:#ff6f9c}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

#stage{min-height:200px}
.prompt{display:flex;flex-direction:column;align-items:center;justify-content:center;margin:6px 0 16px;min-height:120px}
.emoji-xl{font-size:clamp(64px,22vw,120px);line-height:1}

.promptword{font-size:20px;font-weight:700;margin-top:4px;letter-spacing:1px}
.options{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}

.opt{border:3px solid #efe7d8;background:#fff;border-radius:18px;min-width:84px;padding:14px 16px;font-family:inherit;cursor:pointer;box-shadow:0 4px 0 rgba(124,36,16,.10);display:flex;flex-direction:column;align-items:center;gap:4px}

.shake{animation:shk .4s}

.card .back{background:linear-gradient(150deg,var(--coral),#e8916f)}

.card .front{background:#fff;border:3px solid #efe7d8;transform:rotateY(180deg)}
.card.flipped .back{transform:rotateY(180deg)}.card.flipped .front{transform:rotateY(360deg)}
.card.matched .front{border-color:var(--verde);background:#eafaf1}.card.matched{animation:pop .4s}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.08)}100%{transform:scale(1)}}
.card .emoji{font-size:clamp(28px,8vw,48px)}.card .word{font-size:clamp(12px,3.4vw,17px);font-weight:700;margin-top:2px}
.shadow{filter:brightness(0) saturate(0);opacity:.85}

.btn.primary{background:var(--verde);color:#fff}.btn.ghost{background:#f3efe6;color:var(--tinta)}
.sheet{position:fixed;inset:0;background:rgba(21,32,43,.5);display:none;align-items:center;justify-content:center;z-index:30;padding:20px}.sheet.show{display:flex}
.sheetcard{background:#fff;border-radius:24px;padding:24px;max-width:360px;width:100%;text-align:center;position:relative}
.closex{position:absolute;top:12px;right:12px;border:none;background:#f3efe6;border-radius:50%;width:34px;height:34px;font-size:16px;cursor:pointer}
.sheetcard .big{font-size:46px}.sheetcard h2{color:var(--terra);margin:6px 0 10px}.sheetcard p{font-size:15px;color:#5a5346;line-height:1.5}
.sitelink{display:inline-block;margin-top:14px;color:var(--terra);font-weight:600;text-decoration:none}
#confetti{position:fixed;inset:0;pointer-events:none;z-index:40;overflow:hidden}
.conf{position:absolute;top:-12px;width:10px;height:14px;border-radius:2px;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.9}}
.spark{position:fixed;width:9px;height:9px;border-radius:50%;pointer-events:none;z-index:40;animation:sp .7s ease-out forwards}
@keyframes sp{to{transform:translate(var(--dx),var(--dy));opacity:0}}
</style></head><body>
<button class="info-btn" id="infoBtn" aria-label="Sobre">ⓘ</button>
<div class="wrap">
  <section class="home" id="home">
    <div class="kicker" id="kicker"></div>
    <h1 id="h1"></h1>
    <div class="tag" id="tag"></div>

</div>
<div class="win" id="win"><div class="wincard"><div class="em" id="winEmoji">🎉</div><h2 id="winH">Você conseguiu!</h2><p id="winMsg"></p><button class="btn primary" id="nextBtn">Próximo nível ➜</button><button class="btn ghost" id="homeBtn">Escolher nível</button></div></div>
<div class="sheet" id="about"><div class="sheetcard"><button class="closex" id="aboutClose">✕</button><div class="big" id="aboutEmoji">🎈</div><h2 id="aboutTitle"></h2><p id="aboutTxt"></p><a class="sitelink" href="https://www.thiagopatente.com.br" target="_blank" rel="noopener">🌐 www.thiagopatente.com.br</a></div></div>
<div id="confetti"></div>
<script>window.__G__={"slug": "rimas", "engine": "memory", "title": "As Rimas", "kicker": "Jogos da Bibel", "hero": "🦆🐱", "tag": "memória das palavras que rimam", "hint": "⚽ escolha um nível", "unit": "rimas", "levels": [{"nome": "Nível 1", "sub": "3 rimas", "say": "Ache as palavras que rimam!", "cards": [{"key": "ato", "html": "<div class=\"emoji\">🦆</div><div class=\"word\">PATO</div>", "say": "PATO"}, {"key": "ato", "html": "<div class=\"emoji\">🐱</div><div class=\"word\">GATO</div>", "say": "GATO"}, {"key": "ao", "html": "<div class=\"emoji\">🍞</div><div class=\"word\">PÃO</div>", "say": "PÃO"}, {"key": "ao", "html": "<div class=\"emoji\">✋</div><div class=\"word\">MÃO</div>", "say": "MÃO"}, {"key": "alo", "html": "<div class=\"emoji\">🐓</div><div class=\"word\">GALO</div>", "say": "GALO"}, {"key": "alo", "html": "<div class=\"emoji\">🐴</div><div class=\"word\">CAVALO</div>", "say": "CAVALO"}]}, {"nome": "Nível 2", "sub": "4 rimas", "say": "Ache as palavras que rimam!", "cards": [{"key": "ato", "html": "<div class=\"emoji\">🦆</div><div class=\"word\">PATO</div>", "say": "PATO"}, {"key": "ato", "html": "<div class=\"emoji\">🐱</div><div class=\"word\">GATO</div>", "say": "GATO"}, {"key": "ao", "html": "<div class=\"emoji\">🍞</div><div class=\"word\">PÃO</div>", "say": "PÃO"}, {"key": "ao", "html": "<div class=\"emoji\">✋</div><div class=\"word\">MÃO</div>", "say": "MÃO"}, {"key": "alo", "html": "<div class=\"emoji\">🐓</div><div class=\"word\">GALO</div>", "say": "GALO"}, {"key": "alo", "html": "<div class=\"emoji\">🐴</div><div class=\"word\">CAVALO</div>", "say": "CAVALO"}, {"key": "elho", "html": "<div class=\"emoji\">🐰</div><div class=\"word\">COELHO</div>", "say": "COELHO"}, {"key": "elho", "html": "<div class=\"emoji\">🪞</div><div class=\"word\">ESPELHO</div>", "say": "ESPELHO"}]}, {"nome": "Nível 3", "sub": "6 rimas", "say": "Ache as palavras que rimam!", "cards": [{"key": "ato", "html": "<div class=\"emoji\">🦆</div><div class=\"word\">PATO</div>", "say": "PATO"}, {"key": "ato", "html": "<div class=\"emoji\">🐱</div><div class=\"word\">GATO</div>", "say": "GATO"}, {"key": "ao", "html": "<div class=\"emoji\">🍞</div><div class=\"word\">PÃO</div>", "say": "PÃO"}, {"key": "ao", "html": "<div class=\"emoji\">✋</div><div class=\"word\">MÃO</div>", "say": "MÃO"}, {"key": "alo", "html": "<div class=\"emoji\">🐓</div><div class=\"word\">GALO</div>", "say": "GALO"}, {"key": "alo", "html": "<div class=\"emoji\">🐴</div><div class=\"word\">CAVALO</div>", "say": "CAVALO"}, {"key": "elho", "html": "<div class=\"emoji\">🐰</div><div class=\"word\">COELHO</div>", "say": "COELHO"}, {"key": "elho", "html": "<div class=\"emoji\">🪞</div><div class=\"word\">ESPELHO</div>", "say": "ESPELHO"}, {"key": "ela", "html": "<div class=\"emoji\">⭐</div><div class=\"word\">ESTRELA</div>", "say": "ESTRELA"}, {"key": "ela", "html": "<div class=\"emoji\">🍳</div><div class=\"word\">PANELA</div>", "say": "PANELA"}, {"key": "ado", "html": "<div class=\"emoji\">🎲</div><div class=\"word\">DADO</div>", "say": "DADO"}, {"key": "ado", "html": "<div class=\"emoji\">🔒</div><div class=\"word\">CADEADO</div>", "say": "CADEADO"}]}], "about": "Feito por <b>Thiago Patente</b>, para as duas filhas, e construído com inteligência artificial."};

var G=window.__G__;
var state={level:0,voice:true,completed:new Set(),lock:false};
function $(id){return document.getElementById(id);}
var stageEl=$('stage'),paresEl=$('paresInfo'),tempoEl=$('tempoInfo'),lvlNameEl=$('lvlName'),homeEl=$('home'),gameEl=$('game'),winEl=$('win'),voiceBtn=$('voiceBtn');
// textos da home
$('kicker').textContent=G.kicker;$('h1').textContent=G.title;$('tag').textContent=G.tag;$('hero').textContent=G.hero;$('hint').textContent=G.hint;
$('aboutTitle').textContent=G.title;$('aboutEmoji').textContent=G.hero;$('aboutTxt').innerHTML=G.about;
document.title=G.title+' · Jogos da Bibel';
// voz
var ptVoice=null;
function pickVoice(){if(!('speechSynthesis'in window))return;var vs=speechSynthesis.getVoices()||[];var pt=vs.filter(function(v){return /pt[-_ ]?BR|portugu/i.test((v.lang||'')+' '+(v.name||''));});var fem=pt.find(function(v){return /maria|luciana|francisca|fem|google|hel|vit|ana|julia|liv/i.test(v.name||'');});ptVoice=fem||pt[0]||null;}
if('speechSynthesis'in window){pickVoice();speechSynthesis.onvoiceschanged=pickVoice;}
function say(t){if(!state.voice||!('speechSynthesis'in window))return;try{var u=new SpeechSynthesisUtterance(t);u.lang='pt-BR';if(ptVoice)u.voice=ptVoice;u.rate=.96;u.pitch=1.5;speechSynthesis.cancel();speechSynthesis.speak(u);}catch(e){}}
// timer
var timer={sec:0,id:null};
function fmt(s){var m=Math.floor(s/60),x=s%60;return (m<10?'0':'')+m+':'+(x<10?'0':'')+x;}
function startTimer(){stopTimer();timer.sec=0;tempoEl.textContent='⏱ 00:00';timer.id=setInterval(function(){timer.sec++;tempoEl.textContent='⏱ '+fmt(timer.sec);},1000);}
function stopTimer(){if(timer.id){clearInterval(timer.id);timer.id=null;}}
function setStats(done,total){paresEl.textContent=done+'/'+total+' '+G.unit;}
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function shake(el){el.classList.add('shake');setTimeout(function(){el.classList.remove('shake');},420);}
// home
function renderHome(){var L=$('levels');L.innerHTML='';G.levels.forEach(function(lv,i){var done=state.completed.has(i);var b=document.createElement('button');b.className='lvl';b.innerHTML='<span class="num">'+(i+1)+'</span><span class="meta"><b>'+lv.nome+'</b><span>'+lv.sub+'</span></span><span class="star">'+(done?'⭐':'')+'</span>';b.onclick=function(){startLevel(i);};L.appendChild(b);});}
function startLevel(i){state.level=i;lvlNameEl.textContent=G.levels[i].nome;homeEl.style.display='none';gameEl.classList.add('active');window.scrollTo(0,0);engineStart(i);}
function finishLevel(){stopTimer();state.completed.add(state.level);var last=state.level===G.levels.length-1;$('winEmoji').textContent=last?'🏆':'🎉';$('winMsg').textContent=(last?'Você terminou o jogo todo!':'Muito bem!')+'   ⏱ '+fmt(timer.sec);$('nextBtn').style.display=last?'none':'block';winEl.classList.add('show');confetti();say(last?'Parabéns!':'Muito bem!');}
$('nextBtn').onclick=function(){winEl.classList.remove('show');startLevel(Math.min(state.level+1,G.levels.length-1));};
$('homeBtn').onclick=function(){winEl.classList.remove('show');goHome();};
$('backBtn').onclick=goHome;$('againBtn').onclick=function(){startLevel(state.level);};
function goHome(){stopTimer();gameEl.classList.remove('active');homeEl.style.display='flex';renderHome();window.scrollTo(0,0);}
function refreshVoice(){voiceBtn.classList.toggle('off',!state.voice);voiceBtn.innerHTML='<span class="sw"></span> '+(state.voice?'Falar':'Som desligado');}
voiceBtn.onclick=function(){state.voice=!state.voice;refreshVoice();if(state.voice)say('Vamos jogar!');};
var aboutEl=$('about');$('infoBtn').onclick=function(){aboutEl.classList.add('show');};$('aboutClose').onclick=function(){aboutEl.classList.remove('show');};aboutEl.onclick=function(e){if(e.target===aboutEl)aboutEl.classList.remove('show');};
function burst(x,y){var box=$('confetti');var c=['#ffc23f','#3aa7ff','#ff6f9c','#2bb673','#d97757'];for(var i=0;i<14;i++){var p=document.createElement('div');p.className='spark';var a=Math.random()*6.28,d=36+Math.random()*54;p.style.left=x+'px';p.style.top=y+'px';p.style.background=c[i%c.length];p.style.setProperty('--dx',(Math.cos(a)*d).toFixed(0)+'px');p.style.setProperty('--dy',(Math.sin(a)*d).toFixed(0)+'px');box.appendChild(p);setTimeout(function(){p.remove();},720);}}
function confetti(){var box=$('confetti');var c=['#ffc23f','#3aa7ff','#ff6f9c','#2bb673','#d97757'];for(var i=0;i<70;i++){var d=document.createElement('div');d.className='conf';d.style.left=Math.random()*100+'vw';d.style.background=c[i%c.length];d.style.animationDuration=(2+Math.random()*1.5)+'s';d.style.animationDelay=(Math.random()*.4)+'s';box.appendChild(d);setTimeout(function(){d.remove();},4000);}}
renderHome();refreshVoice();


function engineStart(i){var lv=G.levels[i];var cards=lv.cards.slice();var pairs=cards.length/2;var matched=0;var first=null;state.lock=true;setStats(0,pairs);
 var deck=shuffle(cards.slice());
 var h='<div class="board'+(deck.length>9?' c4':'')+'">';
 deck.forEach(function(c){h+='<div class="card flipped" data-key="'+c.key+'" data-say="'+(c.say||'')+'"><div class="face back"></div><div class="face front">'+c.html+'</div></div>';});
 h+='</div>';stageEl.innerHTML=h;say(lv.say||'Ache os pares!');
 var els=stageEl.querySelectorAll('.card');
 els.forEach(function(card){card.addEventListener('click',function(){onPick(card);});});
 setTimeout(function(){els.forEach(function(c){if(!c.classList.contains('matched'))c.classList.remove('flipped');});state.lock=false;startTimer();},2200);
 function onPick(card){if(state.lock)return;if(card.classList.contains('flipped')||card.classList.contains('matched'))return;card.classList.add('flipped');if(card.dataset.say)say(card.dataset.say);
  if(!first){first=card;return;}var a=first,b=card;first=null;
  if(a.dataset.key===b.dataset.key&&a!==b){state.lock=true;setTimeout(function(){a.classList.add('matched');b.classList.add('matched');var rc=b.getBoundingClientRect();burst(rc.left+rc.width/2,rc.top+rc.height/2);matched++;setStats(matched,pairs);state.lock=false;if(matched===pairs)setTimeout(finishLevel,700);},420);}
  else{state.lock=true;setTimeout(function(){a.classList.remove('flipped');b.classList.remove('flipped');state.lock=false;},950);}}
}
